name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.1)"
        required: true
        type: string
      release_name:
        description: "Release name/title (optional)"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manual-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize version input
        id: normalize
        shell: pwsh
        run: |
          $raw = '${{ inputs.version }}'
          $normalized = $raw -replace '^v\.?', ''
          if ($normalized -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid version format: $raw"
          }
          "VERSION=$normalized" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "tag=v$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set package version for build
        shell: pwsh
        run: npm version $env:VERSION --no-git-tag-version --allow-same-version

      - name: Build Windows installer (no auto-publish)
        run: npm run build:renderer && npx electron-builder --win nsis --publish never
        env:
          ELECTRON_BUILDER_CACHE: .cache/electron-builder

      - name: Resolve updater artifact path
        id: updater_artifact
        shell: pwsh
        run: |
          $installer = "dist-electron/Good-Old-Launcher-Setup-$env:VERSION.exe"
          if (-not (Test-Path $installer)) {
            throw "Expected installer not found: $installer"
          }
          "installer=$installer" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure tag does not already exist
        shell: pwsh
        run: |
          $tag = '${{ steps.normalize.outputs.tag }}'
          git fetch --tags origin
          $existing = git ls-remote --tags origin "refs/tags/$tag"
          if ($existing) {
            throw "Tag already exists on origin: $tag"
          }

      - name: Create git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.normalize.outputs.tag }}
          git push origin ${{ steps.normalize.outputs.tag }}

      - name: Publish updater assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.normalize.outputs.tag }}
          name: ${{ inputs.release_name || format('Good Old Launcher {0}', steps.normalize.outputs.tag) }}
          body: |
            ## Install
            Use `Good-Old-Launcher-Setup-...exe` to install the app.

            ## Updater metadata
            `latest.yml` is required only for in-app auto-update.
          files: |
            ${{ steps.updater_artifact.outputs.installer }}
            dist-electron/latest.yml
