name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize version from tag
        shell: pwsh
        run: |
          $raw = '${{ github.ref_name }}'
          $normalized = $raw -replace '^v\.?', ''
          if ($normalized -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid tag version: $raw"
          }
          "VERSION=$normalized" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set package version for build
        shell: pwsh
        run: npm version $env:VERSION --no-git-tag-version --allow-same-version

      - name: Build Windows installer (no auto-publish)
        run: npm run build:renderer && npx electron-builder --win nsis --publish never
        env:
          ELECTRON_BUILDER_CACHE: .cache/electron-builder

      - name: Resolve updater artifact path
        id: updater_artifact
        shell: pwsh
        run: |
          $content = Get-Content "dist-electron/latest.yml" -Raw
          $match = [regex]::Match($content, "(?m)^path:\s*(.+)$")
          if (-not $match.Success) {
            throw "Cannot resolve installer path from dist-electron/latest.yml"
          }
          $relative = $match.Groups[1].Value.Trim()
          $full = "dist-electron/$relative"
          if (-not (Test-Path $full)) {
            throw "Installer referenced in latest.yml not found: $full"
          }
          "installer=$full" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish updater assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} · Windows Installer
          body: |
            ## Install
            Use `Good Old Launcher Setup ... .exe` to install the app.

            ## Updater metadata
            `latest.yml` is required only for in-app auto-update.
          files: |
            ${{ steps.updater_artifact.outputs.installer }}
            dist-electron/latest.yml
