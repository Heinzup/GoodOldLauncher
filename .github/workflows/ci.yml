name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  validate-release-tag:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag format
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          if [[ ! "$RAW_TAG" =~ ^v\.?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RAW_TAG"
            echo "Allowed examples: v0.1.1, v.0.1.1, v1.2.3-beta.1"
            exit 1
          fi

          NORMALIZED="${RAW_TAG#v}"
          NORMALIZED="${NORMALIZED#.}"
          echo "Release tag accepted: $RAW_TAG"
          echo "Normalized version: $NORMALIZED"

  build-renderer:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer
